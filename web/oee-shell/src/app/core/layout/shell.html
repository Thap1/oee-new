<div class="shell">
  <header class="shell__topbar">
    <button
      type="button"
      class="shell__sidebar-toggle"
      (click)="toggleSidebar()"
      data-testid="sidebar-toggle"
      aria-label="Toggle sidebar"
    >
      <i class="pi pi-bars"></i>
    </button>

    <div class="shell__brand">OEE</div>

    <app-site-line-selector />

    <div class="shell__topbar-actions">
      <button
        type="button"
        class="shell__lang-btn"
        [class.shell__lang-btn--active]="currentLang() === 'vi'"
        (click)="useLanguage('vi')"
        data-testid="lang-vi"
      >
        VI
      </button>
      <button
        type="button"
        class="shell__lang-btn"
        [class.shell__lang-btn--active]="currentLang() === 'en'"
        (click)="useLanguage('en')"
        data-testid="lang-en"
      >
        EN
      </button>

      <button type="button" class="shell__user-menu-trigger" (click)="userMenu.toggle($event)" data-testid="user-menu-trigger">
        <p-avatar [label]="userInitial()" shape="circle" size="normal" />
        <span class="shell__username">{{ username() }}</span>
        <i class="pi pi-chevron-down"></i>
      </button>
      <p-menu #userMenu [popup]="true" [model]="userMenuItems()" data-testid="user-menu" />
    </div>
  </header>

  <div class="shell__body">
    <nav class="shell__sidebar" [class.shell__sidebar--collapsed]="sidebarCollapsed()" data-testid="sidebar">
      @for (item of menuItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="shell__nav-item--active"
          class="shell__nav-item"
          [attr.data-testid]="'nav-' + item.route"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.labelKey | translate }}</span>
        </a>
      }
    </nav>

    <main class="shell__content">
      <router-outlet />
    </main>
  </div>

  <footer class="shell__footer">oee-new</footer>
</div>
